<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hype Watcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f; --bg-card: #111118; --bg-hover: #1a1a24;
  --border: #2a2a3a; --text: #e4e4ef; --text-dim: #8888a0;
  --cyan: #06b6d4; --amber: #f59e0b; --purple: #8b5cf6;
  --green: #10b981; --red: #ef4444;
  --glow-cyan: 0 0 12px rgba(6,182,212,0.4);
  --glow-amber: 0 0 12px rgba(245,158,11,0.4);
  --glow-purple: 0 0 12px rgba(139,92,246,0.4);
}
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

/* HEADER */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #0f0f18, var(--bg));
  flex-shrink: 0; z-index: 10;
}
header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
header h1 span { color: var(--cyan); }
.view-tabs { display: flex; gap: 4px; }
.view-tab {
  padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500;
  background: transparent; color: var(--text-dim); border: 1px solid transparent;
  cursor: pointer; transition: all 0.2s;
}
.view-tab:hover { color: var(--text); background: var(--bg-hover); }
.view-tab.active { color: var(--cyan); border-color: var(--cyan); background: rgba(6,182,212,0.08); }

/* LAYOUT */
.layout { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 260px; min-width: 260px; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow-y: auto; padding: 12px;
  background: var(--bg-card); flex-shrink: 0;
}
.sidebar-section { margin-bottom: 16px; }
.sidebar-section h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 8px; }
.search-input {
  width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit;
  outline: none; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--cyan); }
.filter-list { max-height: 200px; overflow-y: auto; }
.filter-item {
  display: flex; align-items: center; gap: 6px; padding: 3px 0; cursor: pointer; font-size: 12px; color: var(--text-dim);
  transition: color 0.15s;
}
.filter-item:hover { color: var(--text); }
.filter-item input[type="checkbox"] { accent-color: var(--cyan); }
.filter-item .count { margin-left: auto; font-size: 10px; opacity: 0.6; }
.edge-toggles label { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 12px; color: var(--text-dim); cursor: pointer; }
.edge-toggles input[type="checkbox"] { accent-color: var(--cyan); }

/* MAIN */
.main-canvas { flex: 1; position: relative; overflow: hidden; }
.main-canvas svg, .main-canvas .view-container { width: 100%; height: 100%; }
.view-container { display: none; overflow: auto; padding: 24px; }
.view-container.active { display: block; }
#graph-svg { display: block; }
#graph-svg.hidden { display: none; }

/* DETAIL PANEL */
.detail-panel {
  position: absolute; top: 0; right: -380px; width: 380px; height: 100%;
  background: var(--bg-card); border-left: 1px solid var(--border);
  transition: right 0.3s ease; z-index: 5; overflow-y: auto; padding: 20px;
}
.detail-panel.open { right: 0; }
.detail-close { position: absolute; top: 12px; right: 12px; background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; }
.detail-close:hover { color: var(--text); }
.detail-type { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 6px; }
.detail-type.source { color: var(--cyan); }
.detail-type.tag { color: var(--amber); }
.detail-type.module { color: var(--purple); }
.detail-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; line-height: 1.3; }
.detail-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; }
.detail-summary { font-size: 13px; line-height: 1.6; color: var(--text-dim); margin-bottom: 16px; }
.detail-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 16px; }
.detail-tag {
  font-size: 11px; padding: 3px 8px; border-radius: 4px;
  background: rgba(245,158,11,0.12); color: var(--amber); cursor: pointer;
}
.detail-tag:hover { background: rgba(245,158,11,0.25); }
.detail-related { margin-top: 12px; }
.detail-related h4 { font-size: 12px; font-weight: 600; color: var(--text-dim); margin-bottom: 8px; }
.detail-related a {
  display: block; font-size: 12px; color: var(--cyan); text-decoration: none;
  padding: 4px 0; cursor: pointer;
}
.detail-related a:hover { text-decoration: underline; }
.detail-link { display: inline-block; margin-top: 12px; font-size: 12px; color: var(--cyan); text-decoration: none; }
.detail-link:hover { text-decoration: underline; }

/* TOOLTIP */
.tooltip {
  position: absolute; pointer-events: none; background: #1a1a28; border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; font-size: 12px; max-width: 280px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 20; opacity: 0; transition: opacity 0.15s;
}
.tooltip.visible { opacity: 1; }
.tooltip .tt-title { font-weight: 600; margin-bottom: 4px; }
.tooltip .tt-meta { color: var(--text-dim); font-size: 11px; }

/* FOOTER */
footer {
  padding: 8px 20px; border-top: 1px solid var(--border); font-size: 11px;
  color: var(--text-dim); text-align: center; flex-shrink: 0;
}

/* GRAPH NODES */
.node-source { fill: var(--cyan); }
.node-tag { fill: var(--amber); }
.node-module { fill: var(--purple); }
.node-dimmed { opacity: 0.08; }
.edge-line { stroke-opacity: 0.15; }
.edge-line.edge-related { stroke: #ffffff; stroke-opacity: 0.4; }
.edge-line.edge-curriculum { stroke: var(--purple); stroke-opacity: 0.3; stroke-dasharray: 4 3; }
.edge-line.edge-tag { stroke: var(--amber); stroke-opacity: 0.15; stroke-dasharray: 2 2; }
.edge-dimmed { stroke-opacity: 0.02 !important; }
.hull { fill-opacity: 0.04; stroke-opacity: 0.15; stroke-width: 1; }
.node-label { fill: var(--text); font-size: 10px; font-weight: 500; pointer-events: none; text-anchor: middle; }

/* TIMELINE */
.timeline-source { cursor: pointer; }
.timeline-source:hover circle { r: 6; }
.timeline-marker { stroke: var(--green); stroke-dasharray: 4 2; stroke-opacity: 0.4; }
.timeline-label { font-size: 10px; fill: var(--text-dim); }
.swimlane-label { font-size: 11px; fill: var(--text-dim); font-weight: 500; }
.axis text { fill: var(--text-dim); font-size: 10px; }
.axis line, .axis path { stroke: var(--border); }

/* CURRICULUM CARDS */
.curriculum-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.curr-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  padding: 20px; cursor: pointer; transition: all 0.2s;
}
.curr-card:hover { border-color: var(--purple); box-shadow: var(--glow-purple); }
.curr-card h3 { font-size: 15px; font-weight: 600; color: var(--purple); margin-bottom: 8px; }
.curr-card .source-count { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; }
.curr-dots { display: flex; flex-wrap: wrap; gap: 4px; }
.curr-dot { width: 8px; height: 8px; border-radius: 50%; }

/* SANKEY CURRICULUM */
.sankey-wrapper { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
.sankey-stats {
  display: flex; align-items: center; gap: 16px; padding: 12px 20px;
  border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
}
.sankey-stats .stat {
  font-size: 13px; font-weight: 500; color: var(--text-dim);
  display: flex; align-items: center; gap: 6px;
}
.sankey-stats .stat-value { color: var(--text); font-weight: 600; }
.sankey-stats .stat-level { color: var(--purple); }
.sankey-stats .stat-xp { color: var(--cyan); }
.sankey-stats .stat-streak { color: var(--amber); }
.sankey-stats .xp-bar {
  width: 120px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
}
.sankey-stats .xp-bar-fill { height: 100%; background: var(--cyan); border-radius: 3px; transition: width 0.4s; }
.sankey-container { flex: 1; overflow: auto; padding: 20px; display: flex; justify-content: center; align-items: flex-start; }
.sankey-container svg { max-width: 100%; }
.sankey-node rect { cursor: pointer; transition: opacity 0.2s; rx: 4; ry: 4; }
.sankey-node rect:hover { opacity: 0.85; }
.sankey-node text { font-size: 11px; fill: var(--text); pointer-events: none; }
.sankey-node .node-count { font-size: 10px; fill: var(--text-dim); }
.sankey-node .node-progress { font-size: 10px; fill: var(--green); font-weight: 600; }
.sankey-link path { fill: none; stroke-opacity: 0.25; transition: stroke-opacity 0.2s; }
.sankey-link path:hover { stroke-opacity: 0.5; }
.sankey-dep-arrow { stroke: var(--purple); stroke-opacity: 0.3; stroke-dasharray: 6 4; fill: none; stroke-width: 1.5; }
.sankey-dep-head { fill: var(--purple); opacity: 0.3; }
.concept-list { display: flex; flex-direction: column; gap: 2px; margin-top: 12px; }
.concept-item {
  display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px;
  border-radius: 6px; cursor: pointer; transition: background 0.15s;
}
.concept-item:hover { background: var(--bg-hover); }
.concept-item input[type="checkbox"] {
  margin-top: 2px; flex-shrink: 0; accent-color: var(--cyan);
  width: 16px; height: 16px; cursor: pointer;
}
.concept-item.completed .concept-title { color: var(--text-dim); text-decoration: line-through; }
.strength-badge {
  flex-shrink: 0; font-size: 10px; font-weight: 700; width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center; border-radius: 4px;
  background: rgba(255,255,255,0.05); margin-left: auto;
}
.concept-title { font-size: 13px; line-height: 1.4; }
.section-progress { margin-top: 8px; margin-bottom: 4px; }
.section-progress-bar {
  width: 100%; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 4px;
}
.section-progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
.module-sections-list { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
.module-section-card {
  padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
}
.module-section-card:hover { border-color: var(--cyan); background: var(--bg-hover); }
.module-section-card h4 { font-size: 13px; margin-bottom: 4px; }
.module-section-card .sec-meta { font-size: 11px; color: var(--text-dim); }
@media (max-width: 768px) {
  .sankey-stats { gap: 8px; padding: 8px 12px; }
  .sankey-stats .stat { font-size: 11px; }
  .sankey-stats .xp-bar { width: 80px; }
  .sankey-container { padding: 12px; overflow-x: auto; }
  .sankey-node text { font-size: 9px; }
}

/* THESIS TRACKER */
.theses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; padding: 20px; }
.thesis-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; cursor: pointer; transition: all 0.2s;
}
.thesis-card:hover { border-color: var(--cyan); box-shadow: var(--glow-cyan); }
.thesis-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.thesis-id { font-size: 11px; color: var(--text-dim); font-weight: 600; }
.thesis-title { font-size: 14px; font-weight: 600; flex: 1; }
.thesis-status {
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.thesis-status.confirmed { background: rgba(16,185,129,0.15); color: #10b981; }
.thesis-status.evolved { background: rgba(6,182,212,0.15); color: #06b6d4; }
.thesis-status.challenged { background: rgba(245,158,11,0.15); color: #f59e0b; }
.thesis-status.debunked { background: rgba(239,68,68,0.15); color: #ef4444; }
.thesis-meta { display: flex; gap: 12px; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; }
.thesis-trend { font-weight: 600; }
.thesis-trend.strengthening { color: #10b981; }
.thesis-trend.stable { color: var(--text-dim); }
.thesis-trend.weakening { color: #ef4444; }
.thesis-confidence { display: flex; gap: 2px; }
.thesis-summary { font-size: 12px; color: var(--text-dim); line-height: 1.5; }
.thesis-modules { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
.thesis-mod-tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: rgba(139,92,246,0.1); color: var(--purple); }
.thesis-filter-bar { display: flex; gap: 8px; padding: 12px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.thesis-filter-btn {
  padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
  background: transparent; color: var(--text-dim); border: 1px solid var(--border);
  cursor: pointer; transition: all 0.2s;
}
.thesis-filter-btn.active { color: var(--cyan); border-color: var(--cyan); background: rgba(6,182,212,0.08); }

/* TAG CLOUD */
.tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center; padding: 40px 20px; }
.tag-cloud-item {
  padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all 0.2s;
  background: rgba(245,158,11,0.08); color: var(--amber); border: 1px solid transparent;
}
.tag-cloud-item:hover { border-color: var(--amber); box-shadow: var(--glow-amber); }
.tag-toggle-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
.tag-toggle-btn {
  padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500;
  background: transparent; color: var(--text-dim); border: 1px solid var(--border);
  cursor: pointer; transition: all 0.2s;
}
.tag-toggle-btn.active { color: var(--amber); border-color: var(--amber); background: rgba(245,158,11,0.08); }

/* HEATMAP */
.heatmap-container { overflow: auto; display: flex; justify-content: center; }
.heatmap-cell { transition: opacity 0.15s; }
.heatmap-cell:hover { stroke: var(--text); stroke-width: 1; }
.heatmap-label { font-size: 9px; fill: var(--text-dim); }

/* RESPONSIVE */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .detail-panel { width: 100%; right: -100%; }
}
</style>
</head>
<body>

<header>
  <h1><span>AI</span> Hype Watcher</h1>
  <div class="view-tabs">
    <button class="view-tab" data-view="graph">Graph</button>
    <button class="view-tab" data-view="timeline">Timeline</button>
    <button class="view-tab active" data-view="curriculum">Curriculum</button>
    <button class="view-tab" data-view="tags">Tags</button>
    <button class="view-tab" data-view="theses">Theses</button>
    <a class="view-tab" href="reader.html" style="text-decoration:none">Reader</a>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <h3>Search</h3>
      <input class="search-input" type="text" placeholder="Search sources, tags..." id="search">
    </div>
    <div class="sidebar-section">
      <h3>Edge Types</h3>
      <div class="edge-toggles">
        <label><input type="checkbox" data-edge="related" checked> Related (cross-ref)</label>
        <label><input type="checkbox" data-edge="curriculum" checked> Curriculum</label>
        <label><input type="checkbox" data-edge="tag"> Tag connections</label>
      </div>
    </div>
    <div class="sidebar-section">
      <h3>Tags</h3>
      <div class="filter-list" id="tag-filters"></div>
    </div>
    <div class="sidebar-section">
      <h3>Modules</h3>
      <div class="filter-list" id="module-filters"></div>
    </div>
    <div class="sidebar-section">
      <h3>Creators</h3>
      <div class="filter-list" id="creator-filters"></div>
    </div>
  </aside>

  <div class="main-canvas">
    <svg id="graph-svg"></svg>
    <div class="view-container" id="timeline-view"></div>
    <div class="view-container" id="curriculum-view"></div>
    <div class="view-container" id="tags-view"></div>
    <div class="view-container" id="theses-view"></div>

    <div class="detail-panel" id="detail-panel">
      <button class="detail-close" id="detail-close">&times;</button>
      <div id="detail-content"></div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>
<footer id="footer"></footer>

<script>
(async function() {
  // ── DATA ──
  const data = await d3.json('data.json');
  const nodeMap = new Map(data.nodes.map(n => [n.id, n]));
  const edgeIndex = new Map(); // nodeId -> [{edge, other}]
  data.edges.forEach(e => {
    if (!edgeIndex.has(e.source)) edgeIndex.set(e.source, []);
    if (!edgeIndex.has(e.target)) edgeIndex.set(e.target, []);
    edgeIndex.get(e.source).push({ edge: e, other: e.target });
    edgeIndex.get(e.target).push({ edge: e, other: e.source });
  });

  // Footer
  document.getElementById('footer').textContent =
    `${data.meta.source_count} sources · ${data.meta.tag_count} tags · ${data.nodes.filter(n=>n.type==='module').length} modules · ${data.synthesis.length} synthesis docs`;

  // ── PROGRESS SYSTEM ──
  const Progress = (() => {
    const KEY = 'hypeWatcher_progress';
    const XP_MAP = { 'core-concepts': 10, 'patterns': 15, 'pitfalls': 5, 'exercises': 25 };
    const LEVELS = [
      { xp: 0, title: 'Observer' }, { xp: 100, title: 'Student' },
      { xp: 300, title: 'Practitioner' }, { xp: 600, title: 'Specialist' },
      { xp: 1000, title: 'Architect' }, { xp: 2000, title: 'Hype Watchdog' },
    ];
    function load() {
      try { return JSON.parse(localStorage.getItem(KEY)) || defaults(); }
      catch { return defaults(); }
    }
    function defaults() { return { version: 1, streakDays: 0, streakLastDate: '', modules: {} }; }
    function save(state) { localStorage.setItem(KEY, JSON.stringify(state)); }
    function isComplete(moduleId, sectionId, itemId) {
      const s = load();
      return !!(s.modules[moduleId]?.[sectionId]?.[itemId]);
    }
    function toggle(moduleId, sectionId, itemId) {
      const s = load();
      if (!s.modules[moduleId]) s.modules[moduleId] = {};
      if (!s.modules[moduleId][sectionId]) s.modules[moduleId][sectionId] = {};
      s.modules[moduleId][sectionId][itemId] = !s.modules[moduleId][sectionId][itemId];
      if (!s.modules[moduleId][sectionId][itemId]) delete s.modules[moduleId][sectionId][itemId];
      save(s);
    }
    function getSectionProgress(moduleId, sectionId, items) {
      const s = load();
      const completed = items.filter(i => s.modules[moduleId]?.[sectionId]?.[i.id]).length;
      return { completed, total: items.length, pct: items.length ? Math.round(completed / items.length * 100) : 0 };
    }
    function getModuleProgress(mod) {
      const sections = mod.sections || [];
      let completed = 0, total = 0;
      sections.forEach(sec => {
        const p = getSectionProgress(mod.id.replace('mod:', ''), sec.id, sec.items);
        completed += p.completed; total += p.total;
      });
      return { completed, total, pct: total ? Math.round(completed / total * 100) : 0 };
    }
    function getOverall(modules) {
      let completed = 0, total = 0, xp = 0;
      const s = load();
      modules.forEach(mod => {
        const modId = mod.id.replace('mod:', '');
        (mod.sections || []).forEach(sec => {
          sec.items.forEach(item => {
            total++;
            if (s.modules[modId]?.[sec.id]?.[item.id]) {
              completed++;
              xp += XP_MAP[sec.id] || 10;
            }
          });
        });
      });
      // Streak bonus
      xp += (s.streakDays || 0) * 10;
      const level = [...LEVELS].reverse().find(l => xp >= l.xp) || LEVELS[0];
      const nextLevel = LEVELS[LEVELS.indexOf(level) + 1];
      return { completed, total, pct: total ? Math.round(completed / total * 100) : 0, xp, level, nextLevel, streakDays: s.streakDays || 0 };
    }
    function updateStreak() {
      const s = load();
      const today = new Date().toISOString().slice(0, 10);
      if (s.streakLastDate === today) return;
      const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      if (s.streakLastDate === yesterday) {
        s.streakDays = (s.streakDays || 0) + 1;
      } else if (s.streakLastDate !== today) {
        s.streakDays = 1;
      }
      s.streakLastDate = today;
      save(s);
    }
    return { load, isComplete, toggle, getSectionProgress, getModuleProgress, getOverall, updateStreak, LEVELS };
  })();
  Progress.updateStreak();

  // ── STATE ──
  const validViews = ['graph', 'timeline', 'curriculum', 'tags', 'theses'];
  const initialHash = location.hash.slice(1);
  let currentView = validViews.includes(initialHash) ? initialHash : 'curriculum';
  let activeFilters = { tags: new Set(), modules: new Set(), creators: new Set() };
  let edgeVisibility = { related: true, curriculum: true, tag: false };
  let searchQuery = '';

  // ── SIDEBAR ──
  function buildSidebar() {
    const tags = data.nodes.filter(n => n.type === 'tag').sort((a,b) => b.count - a.count);
    const modules = data.nodes.filter(n => n.type === 'module').sort((a,b) => a.order - b.order);
    const creators = [...new Set(data.nodes.filter(n => n.type === 'source').map(n => n.creator))].sort();

    const tagEl = document.getElementById('tag-filters');
    tagEl.innerHTML = tags.map(t =>
      `<label class="filter-item"><input type="checkbox" data-filter="tags" value="${t.label}"> ${t.label} <span class="count">${t.count}</span></label>`
    ).join('');

    const modEl = document.getElementById('module-filters');
    modEl.innerHTML = modules.map(m =>
      `<label class="filter-item"><input type="checkbox" data-filter="modules" value="${m.id.replace('mod:','')}"> ${m.label} <span class="count">${data.edges.filter(e=>e.target===m.id&&e.type==='curriculum').length}</span></label>`
    ).join('');

    const creatorEl = document.getElementById('creator-filters');
    creatorEl.innerHTML = creators.map(c => {
      const count = data.nodes.filter(n => n.type === 'source' && n.creator === c).length;
      return `<label class="filter-item"><input type="checkbox" data-filter="creators" value="${c}"> ${c} <span class="count">${count}</span></label>`;
    }).join('');
  }
  buildSidebar();

  // Sidebar filter events
  document.querySelector('.sidebar').addEventListener('change', e => {
    if (e.target.dataset.filter) {
      const set = activeFilters[e.target.dataset.filter];
      e.target.checked ? set.add(e.target.value) : set.delete(e.target.value);
      applyFilters();
    }
    if (e.target.dataset.edge) {
      edgeVisibility[e.target.dataset.edge] = e.target.checked;
      applyFilters();
    }
  });

  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase();
    applyFilters();
  });

  function isNodeVisible(node) {
    if (searchQuery) {
      const hay = ((node.title||'') + ' ' + (node.label||'') + ' ' + (node.creator||'') + ' ' + (node.tags||[]).join(' ')).toLowerCase();
      if (!hay.includes(searchQuery)) return false;
    }
    if (node.type === 'source') {
      if (activeFilters.tags.size > 0 && !node.tags.some(t => activeFilters.tags.has(t))) return false;
      if (activeFilters.modules.size > 0 && !node.modules.some(m => activeFilters.modules.has(m))) return false;
      if (activeFilters.creators.size > 0 && !activeFilters.creators.has(node.creator)) return false;
      return true;
    }
    if (node.type === 'tag') {
      if (activeFilters.tags.size > 0 && !activeFilters.tags.has(node.label)) return false;
      return true;
    }
    if (node.type === 'module') {
      if (activeFilters.modules.size > 0 && !activeFilters.modules.has(node.id.replace('mod:',''))) return false;
      return true;
    }
    return true;
  }

  // ── VIEW SWITCHING ──
  function switchView(view) {
    if (!validViews.includes(view)) view = 'graph';
    currentView = view;
    document.querySelectorAll('.view-tab').forEach(b => {
      b.classList.toggle('active', b.dataset.view === currentView);
    });
    document.getElementById('graph-svg').classList.toggle('hidden', currentView !== 'graph');
    document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
    if (currentView !== 'graph') {
      document.getElementById(currentView + '-view').classList.add('active');
    }
    if (currentView === 'graph') renderGraph();
    if (currentView === 'timeline') renderTimeline();
    if (currentView === 'curriculum') renderCurriculum();
    if (currentView === 'tags') renderTags();
    if (currentView === 'theses') renderTheses();
    history.replaceState(null, '', '#' + currentView);
  }

  document.querySelectorAll('.view-tab').forEach(btn => {
    btn.addEventListener('click', () => switchView(btn.dataset.view));
  });

  window.addEventListener('hashchange', () => {
    const view = location.hash.slice(1);
    if (validViews.includes(view) && view !== currentView) switchView(view);
  });

  // ── TOOLTIP ──
  const tooltip = document.getElementById('tooltip');
  function showTooltip(evt, html) {
    tooltip.innerHTML = html;
    tooltip.classList.add('visible');
    const x = Math.min(evt.pageX + 12, window.innerWidth - 300);
    const y = Math.min(evt.pageY + 12, window.innerHeight - 100);
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  }
  function hideTooltip() { tooltip.classList.remove('visible'); }

  // ── DETAIL PANEL ──
  const detailPanel = document.getElementById('detail-panel');
  const detailContent = document.getElementById('detail-content');
  document.getElementById('detail-close').addEventListener('click', () => detailPanel.classList.remove('open'));

  function showDetail(node) {
    detailPanel.classList.add('open');
    if (node.type === 'source') {
      const related = data.edges.filter(e => e.type === 'related' && (e.source === node.id || e.target === node.id));
      const relatedNodes = related.map(e => nodeMap.get(e.source === node.id ? e.target : e.source)).filter(Boolean);
      detailContent.innerHTML = `
        <div class="detail-type source">Source #${node.id}</div>
        <div class="detail-title">${node.title}</div>
        <div class="detail-meta">${node.creator} · ${node.date}</div>
        <div class="detail-summary">${node.summary || 'No summary available.'}</div>
        <div class="detail-tags">${(node.tags||[]).map(t => `<span class="detail-tag" data-tag="${t}">${t}</span>`).join('')}</div>
        ${relatedNodes.length ? `<div class="detail-related"><h4>Related Sources</h4>${relatedNodes.map(r => `<a data-id="${r.id}">[${r.id}] ${r.title}</a>`).join('')}</div>` : ''}
        ${node.url ? `<a class="detail-link" href="${node.url}" target="_blank">Open source &rarr;</a>` : ''}
      `;
    } else if (node.type === 'tag') {
      const sources = data.edges.filter(e => e.type === 'tag' && e.target === node.id).map(e => nodeMap.get(e.source)).filter(Boolean);
      detailContent.innerHTML = `
        <div class="detail-type tag">Tag</div>
        <div class="detail-title">${node.label}</div>
        <div class="detail-meta">${node.count} sources</div>
        <div class="detail-related"><h4>Sources</h4>${sources.map(s => `<a data-id="${s.id}">[${s.id}] ${s.title}</a>`).join('')}</div>
      `;
    } else if (node.type === 'module') {
      const sources = data.edges.filter(e => e.type === 'curriculum' && e.target === node.id).map(e => nodeMap.get(e.source)).filter(Boolean);
      detailContent.innerHTML = `
        <div class="detail-type module">Module ${String(node.order).padStart(2,'0')}</div>
        <div class="detail-title">${node.label}</div>
        <div class="detail-meta">${sources.length} sources</div>
        <div class="detail-related"><h4>Sources</h4>${sources.map(s => `<a data-id="${s.id}">[${s.id}] ${s.title}</a>`).join('')}</div>
      `;
    }
    // Clickable related source links
    detailContent.querySelectorAll('a[data-id]').forEach(a => {
      a.addEventListener('click', () => { const n = nodeMap.get(a.dataset.id); if (n) showDetail(n); });
    });
    // Clickable tags
    detailContent.querySelectorAll('.detail-tag').forEach(span => {
      span.addEventListener('click', () => {
        const n = nodeMap.get('tag:' + span.dataset.tag);
        if (n) showDetail(n);
      });
    });
  }

  // ── FORCE GRAPH ──
  const svg = d3.select('#graph-svg');
  const canvas = document.querySelector('.main-canvas');
  let width = canvas.clientWidth;
  let height = canvas.clientHeight;
  svg.attr('width', width).attr('height', height);

  const g = svg.append('g');
  const zoom = d3.zoom().scaleExtent([0.2, 5]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  // ── FOCUS GRAPH (one node + neighbors at a time) ──
  let focusNodeId = null; // null = overview (modules + tags only)
  const allNodeData = new Map(data.nodes.map(n => [n.id, {...n}]));

  const connectionCount = new Map();
  data.edges.forEach(e => {
    connectionCount.set(e.source, (connectionCount.get(e.source)||0) + 1);
    connectionCount.set(e.target, (connectionCount.get(e.target)||0) + 1);
  });
  function nodeRadius(n) {
    if (n.type === 'module') return 18;
    if (n.type === 'tag') return 4 + Math.sqrt(n.count || 1) * 2.5;
    return 3 + Math.sqrt(connectionCount.get(n.id) || 1) * 1.8;
  }

  const linkGroup = g.append('g').attr('class', 'links');
  const nodeGroup = g.append('g').attr('class', 'nodes');
  const labelGroup = g.append('g').attr('class', 'labels');

  let simulation = null;

  function getFocusData() {
    let visibleIds;
    let visibleEdges;

    if (!focusNodeId) {
      // Overview: modules + tags only (no sources)
      visibleIds = new Set(data.nodes.filter(n => n.type === 'module' || n.type === 'tag').map(n => n.id));
      visibleEdges = data.edges.filter(e => visibleIds.has(e.source) && visibleIds.has(e.target));
    } else {
      // Focus: the clicked node + top N direct neighbors (capped to stay performant)
      const MAX_NEIGHBORS = 40;
      visibleIds = new Set([focusNodeId]);
      const neighbors = (edgeIndex.get(focusNodeId) || [])
        .filter(({edge}) => edgeVisibility[edge.type])
        .map(({other}) => ({ id: other, connections: connectionCount.get(other) || 0 }))
        .sort((a, b) => b.connections - a.connections)
        .slice(0, MAX_NEIGHBORS);
      neighbors.forEach(({id}) => visibleIds.add(id));
      visibleEdges = data.edges.filter(e => visibleIds.has(e.source) && visibleIds.has(e.target) && edgeVisibility[e.type]);
    }

    // Apply sidebar filters
    const hasFilter = activeFilters.tags.size > 0 || activeFilters.modules.size > 0 || activeFilters.creators.size > 0 || searchQuery;
    const nodes = [...visibleIds].map(id => allNodeData.get(id)).filter(Boolean).filter(n => !hasFilter || isNodeVisible(n));
    const nodeIdSet = new Set(nodes.map(n => n.id));
    const edges = visibleEdges.filter(e => nodeIdSet.has(e.source) && nodeIdSet.has(e.target));

    return { nodes: nodes.map(n => ({...n})), edges: edges.map(e => ({...e})) };
  }

  function renderGraph() {
    // Clear previous
    linkGroup.selectAll('*').remove();
    nodeGroup.selectAll('*').remove();
    labelGroup.selectAll('*').remove();
    if (simulation) simulation.stop();

    const { nodes: gNodes, edges: gEdges } = getFocusData();
    if (!gNodes.length) return;

    simulation = d3.forceSimulation(gNodes)
      .force('link', d3.forceLink(gEdges).id(d => d.id).distance(e => e.type === 'related' ? 60 : e.type === 'curriculum' ? 80 : 100).strength(e => e.type === 'related' ? 0.4 : e.type === 'curriculum' ? 0.2 : 0.05))
      .force('charge', d3.forceManyBody().strength(d => d.id === focusNodeId ? -300 : -120))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collision', d3.forceCollide().radius(d => nodeRadius(d) + 3))
      .alphaDecay(0.03);

    const links = linkGroup.selectAll('line').data(gEdges).enter().append('line')
      .attr('class', d => `edge-line edge-${d.type}`);

    const nodes = nodeGroup.selectAll('g').data(gNodes).enter().append('g')
      .attr('cursor', 'pointer')
      .call(d3.drag()
        .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.1).restart(); d.fx = d.x; d.fy = d.y; })
        .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
        .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
      );

    nodes.filter(d => d.type === 'source').append('circle')
      .attr('r', d => nodeRadius(d)).attr('class', 'node-source')
      .style('filter', 'drop-shadow(0 0 4px rgba(6,182,212,0.3))');
    nodes.filter(d => d.type === 'tag').append('rect')
      .attr('rx', 4).attr('ry', 4)
      .attr('width', d => nodeRadius(d) * 2).attr('height', d => nodeRadius(d) * 1.4)
      .attr('x', d => -nodeRadius(d)).attr('y', d => -nodeRadius(d) * 0.7)
      .attr('class', 'node-tag')
      .style('filter', 'drop-shadow(0 0 4px rgba(245,158,11,0.3))');
    nodes.filter(d => d.type === 'module').append('circle')
      .attr('r', d => nodeRadius(d)).attr('class', 'node-module')
      .style('filter', 'drop-shadow(0 0 6px rgba(139,92,246,0.4))');

    // Highlight the focus node
    nodes.filter(d => d.id === focusNodeId).select('circle, rect')
      .attr('stroke', 'var(--text)').attr('stroke-width', 2);

    const lbls = labelGroup.selectAll('text')
      .data(gNodes.filter(n => n.type !== 'source' || n.id === focusNodeId)).enter().append('text')
      .attr('class', 'node-label')
      .attr('dy', d => nodeRadius(d) + 14)
      .text(d => d.type === 'source' ? `[${d.id}] ${(d.title||'').slice(0,30)}` : d.label || '');

    const gNodeMap = new Map(gNodes.map(n => [n.id, n]));

    nodes.on('mouseover', (evt, d) => {
      const html = d.type === 'source'
        ? `<div class="tt-title">[${d.id}] ${d.title}</div><div class="tt-meta">${d.creator} · ${d.date}</div><div class="tt-meta" style="color:var(--cyan)">Click to focus</div>`
        : `<div class="tt-title">${d.label}</div><div class="tt-meta">${d.type === 'tag' ? d.count + ' sources' : 'Module ' + d.order}</div><div class="tt-meta" style="color:var(--cyan)">Click to focus</div>`;
      showTooltip(evt, html);
    }).on('mouseout', hideTooltip)
    .on('click', (evt, d) => {
      evt.stopPropagation();
      if (d.id === focusNodeId) {
        // Already focused — show detail panel
        showDetail(d);
      } else {
        // Focus on this node
        focusNodeId = d.id;
        showDetail(d);
        renderGraph();
      }
    });

    simulation.on('tick', () => {
      links.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      nodes.attr('transform', d => `translate(${d.x},${d.y})`);
      lbls.attr('x', d => gNodeMap.get(d.id)?.x || 0).attr('y', d => gNodeMap.get(d.id)?.y || 0);
    });
  }

  // Click canvas background → zoom out to overview
  svg.on('click', () => {
    if (focusNodeId) {
      focusNodeId = null;
      detailPanel.classList.remove('open');
      renderGraph();
    } else {
      detailPanel.classList.remove('open');
    }
  });

  function applyFilters() {
    if (currentView === 'graph') renderGraph();
  }

  // ── TIMELINE VIEW ──
  function renderTimeline() {
    const container = document.getElementById('timeline-view');
    container.innerHTML = '';
    const sources = data.nodes.filter(n => n.type === 'source' && n.date).sort((a,b) => a.date.localeCompare(b.date));
    // Group by date for a date-row layout instead of creator swimlanes
    const uniqueDates = [...new Set(sources.map(s => s.date))].sort();
    const margin = { top: 60, right: 40, bottom: 40, left: 100 };
    const rowHeight = 32;
    const w = Math.max(container.clientWidth - 20, 800);
    const h = Math.max(uniqueDates.length * rowHeight + margin.top + margin.bottom, 400);

    const tSvg = d3.select(container).append('svg').attr('width', w).attr('height', h);

    const y = d3.scaleBand().domain(uniqueDates).range([margin.top, h - margin.bottom]).padding(0.2);

    // Date labels on left
    tSvg.selectAll('.date-label').data(uniqueDates).enter()
      .append('text').attr('class', 'swimlane-label')
      .attr('x', margin.left - 10).attr('y', d => y(d) + y.bandwidth() / 2)
      .attr('text-anchor', 'end').attr('dominant-baseline', 'middle')
      .text(d => { const dt = new Date(d + 'T12:00:00'); return d3.timeFormat('%b %d')(dt); });

    // Horizontal grid lines
    tSvg.selectAll('.grid-line').data(uniqueDates).enter()
      .append('line')
      .attr('x1', margin.left).attr('x2', w - margin.right)
      .attr('y1', d => y(d) + y.bandwidth() / 2).attr('y2', d => y(d) + y.bandwidth() / 2)
      .attr('stroke', 'var(--border)').attr('stroke-opacity', 0.3);

    // Synthesis markers
    data.synthesis.forEach(s => {
      if (!s.date || !uniqueDates.includes(s.date)) return;
      tSvg.append('rect')
        .attr('x', margin.left).attr('width', w - margin.left - margin.right)
        .attr('y', y(s.date)).attr('height', y.bandwidth())
        .attr('fill', 'var(--green)').attr('fill-opacity', 0.06).attr('rx', 4);
      tSvg.append('text').attr('class', 'timeline-label')
        .attr('x', w - margin.right + 5).attr('y', y(s.date) + y.bandwidth() / 2)
        .attr('dominant-baseline', 'middle').attr('fill', 'var(--green)')
        .attr('font-size', '9px').text('S');
    });

    // Source dots — spread horizontally within each date row
    uniqueDates.forEach(date => {
      const dateSources = sources.filter(s => s.date === date);
      const dotSpacing = Math.min(24, (w - margin.left - margin.right - 20) / Math.max(dateSources.length, 1));
      const startX = margin.left + 10;

      tSvg.selectAll(null).data(dateSources).enter()
        .append('g').attr('class', 'timeline-source')
        .attr('transform', (d, i) => `translate(${startX + i * dotSpacing},${y(date) + y.bandwidth() / 2})`)
        .each(function(d) {
          d3.select(this).append('circle').attr('r', 5).attr('fill', 'var(--cyan)').style('filter', 'drop-shadow(0 0 3px rgba(6,182,212,0.4))');
        })
        .on('mouseover', (evt, d) => showTooltip(evt, `<div class="tt-title">[${d.id}] ${d.title}</div><div class="tt-meta">${d.creator} · ${d.date}</div>`))
        .on('mouseout', hideTooltip)
        .on('click', (evt, d) => showDetail(d));
    });

    // Legend
    tSvg.append('text').attr('x', margin.left).attr('y', 20).attr('fill', 'var(--text-dim)').attr('font-size', '11px')
      .text('Each row = one date · Dots = sources · Green highlight = synthesis published');
  }

  // ── CURRICULUM VIEW (SANKEY) ──
  const SEC_COLORS = { 'core-concepts': '#06b6d4', 'patterns': '#f59e0b', 'pitfalls': '#ef4444', 'exercises': '#10b981' };
  const MOD_COLOR = '#8b5cf6';

  function renderCurriculum() {
    const container = document.getElementById('curriculum-view');
    const modules = data.nodes.filter(n => n.type === 'module').sort((a, b) => a.order - b.order);

    // Fallback if d3-sankey not loaded
    if (typeof d3.sankey !== 'function') {
      container.innerHTML = '<div style="padding:40px;color:var(--text-dim);text-align:center;">Sankey library not loaded. Please refresh.</div>';
      return;
    }

    const overall = Progress.getOverall(modules);

    // Stats bar
    const xpPct = overall.nextLevel ? Math.min(100, Math.round((overall.xp - overall.level.xp) / (overall.nextLevel.xp - overall.level.xp) * 100)) : 100;
    container.innerHTML = `
      <div class="sankey-wrapper">
        <div class="sankey-stats">
          <div class="stat"><span class="stat-level">${overall.level.title}</span></div>
          <div class="stat"><span class="stat-xp">${overall.xp} XP</span>
            <div class="xp-bar"><div class="xp-bar-fill" style="width:${xpPct}%"></div></div>
          </div>
          <div class="stat"><span class="stat-value">${overall.pct}%</span> complete</div>
          ${overall.streakDays > 0 ? `<div class="stat"><span class="stat-streak">${overall.streakDays}d streak</span></div>` : ''}
        </div>
        <div class="sankey-container" id="sankey-container"></div>
      </div>
    `;

    const sankeyEl = document.getElementById('sankey-container');
    const rect = sankeyEl.getBoundingClientRect();
    const width = Math.max(700, rect.width - 40);
    const height = Math.max(500, Math.min(700, rect.height - 20));

    // Build sankey data
    const sNodes = [];
    const sLinks = [];
    const nodeIdx = new Map();

    modules.forEach(mod => {
      const modId = mod.id;
      const idx = sNodes.length;
      nodeIdx.set(modId, idx);
      const mp = Progress.getModuleProgress(mod);
      sNodes.push({ id: modId, name: `${String(mod.order).padStart(2,'0')}: ${mod.label}`, color: MOD_COLOR, type: 'module', mod, pct: mp.pct });

      (mod.sections || []).forEach(sec => {
        const secKey = `${modId}|${sec.id}`;
        const secIdx = sNodes.length;
        nodeIdx.set(secKey, secIdx);
        const sp = Progress.getSectionProgress(mod.id.replace('mod:', ''), sec.id, sec.items);
        sNodes.push({ id: secKey, name: sec.label, color: SEC_COLORS[sec.id] || '#888', type: 'section', mod, sec, pct: sp.pct });
        sLinks.push({ source: modId, target: secKey, value: Math.max(sec.count, 1), color: SEC_COLORS[sec.id] || '#888' });
      });
    });

    // d3-sankey layout
    const marginLeft = 160, marginRight = 180, marginTop = 10, marginBottom = 10;
    const innerW = width - marginLeft - marginRight;
    const innerH = height - marginTop - marginBottom;
    const sankeyGen = d3.sankey()
      .nodeId(d => d.id)
      .nodeWidth(20)
      .nodePadding(10)
      .nodeAlign(d3.sankeyLeft)
      .extent([[0, 0], [innerW, innerH]]);

    const graph = sankeyGen({
      nodes: sNodes.map(d => ({ ...d })),
      links: sLinks.map(d => ({ ...d })),
    });

    const svgEl = d3.select(sankeyEl).append('svg')
      .attr('width', width)
      .attr('height', height)
      .attr('viewBox', `0 0 ${width} ${height}`);

    const gMain = svgEl.append('g').attr('transform', `translate(${marginLeft},${marginTop})`);

    // Links
    gMain.append('g').selectAll('g')
      .data(graph.links)
      .join('g')
      .attr('class', 'sankey-link')
      .append('path')
      .attr('d', d3.sankeyLinkHorizontal())
      .attr('stroke', d => d.color)
      .attr('stroke-width', d => Math.max(2, d.width));

    // Nodes
    const nodeGroups = gMain.append('g').selectAll('g')
      .data(graph.nodes)
      .join('g')
      .attr('class', 'sankey-node')
      .attr('transform', d => `translate(${d.x0},${d.y0})`);

    // Node rectangles
    nodeGroups.append('rect')
      .attr('width', d => d.x1 - d.x0)
      .attr('height', d => Math.max(d.y1 - d.y0, 2))
      .attr('fill', d => d.color)
      .attr('opacity', d => d.pct === 100 ? 1 : 0.7);

    // Progress fill overlay (darker base + bright fill)
    nodeGroups.each(function(d) {
      if (d.pct > 0 && d.pct < 100) {
        const h = Math.max(d.y1 - d.y0, 2);
        const fillH = h * d.pct / 100;
        d3.select(this).append('rect')
          .attr('width', d.x1 - d.x0)
          .attr('height', fillH)
          .attr('y', h - fillH)
          .attr('fill', '#10b981')
          .attr('opacity', 0.5)
          .attr('rx', 4).attr('ry', 4)
          .style('pointer-events', 'none');
      }
    });

    // Completion checkmarks
    nodeGroups.filter(d => d.pct === 100).append('text')
      .attr('x', d => (d.x1 - d.x0) / 2)
      .attr('y', d => (d.y1 - d.y0) / 2 + 4)
      .attr('text-anchor', 'middle')
      .attr('fill', '#10b981')
      .attr('font-size', '12px')
      .text('\u2713');

    // Labels
    nodeGroups.append('text')
      .attr('x', d => d.type === 'module' ? -6 : (d.x1 - d.x0) + 6)
      .attr('y', d => (d.y1 - d.y0) / 2)
      .attr('dy', '0.35em')
      .attr('text-anchor', d => d.type === 'module' ? 'end' : 'start')
      .text(d => d.name);

    // Count + progress labels
    nodeGroups.filter(d => d.type === 'section').append('text')
      .attr('x', d => (d.x1 - d.x0) + 6)
      .attr('y', d => (d.y1 - d.y0) / 2 + 14)
      .attr('dy', '0.35em')
      .attr('text-anchor', 'start')
      .attr('class', d => d.pct > 0 ? 'node-progress' : 'node-count')
      .text(d => d.pct > 0 ? `${d.sec.count} items · ${d.pct}%` : `${d.sec.count} items`);

    // Module source counts
    nodeGroups.filter(d => d.type === 'module').append('text')
      .attr('x', -6)
      .attr('y', d => (d.y1 - d.y0) / 2 + 14)
      .attr('dy', '0.35em')
      .attr('text-anchor', 'end')
      .attr('class', d => d.pct > 0 ? 'node-progress' : 'node-count')
      .text(d => {
        const srcCount = data.edges.filter(e => e.type === 'curriculum' && e.target === d.mod.id).length;
        return d.pct > 0 ? `${srcCount} sources · ${d.pct}%` : `${srcCount} sources`;
      });

    // Dependency arrows (01→02→03→04→05)
    const mainChain = graph.nodes.filter(d => d.type === 'module' && d.mod.order <= 5).sort((a, b) => a.mod.order - b.mod.order);
    const arrowGroup = gMain.append('g');
    for (let i = 0; i < mainChain.length - 1; i++) {
      const from = mainChain[i];
      const to = mainChain[i + 1];
      const x = from.x0 - 16;
      const y1 = (from.y0 + from.y1) / 2;
      const y2 = (to.y0 + to.y1) / 2;
      arrowGroup.append('path')
        .attr('class', 'sankey-dep-arrow')
        .attr('d', `M${x},${y1} C${x - 20},${(y1 + y2) / 2} ${x - 20},${(y1 + y2) / 2} ${x},${y2}`);
      arrowGroup.append('polygon')
        .attr('class', 'sankey-dep-head')
        .attr('points', `${x},${y2 - 4} ${x + 5},${y2} ${x},${y2 + 4}`);
    }

    // Click handlers
    nodeGroups.on('click', (evt, d) => {
      if (d.type === 'module') showModuleDetail(d.mod);
      else if (d.type === 'section') showSectionDetail(d.mod, d.sec);
    });

    // Tooltips
    nodeGroups.on('mouseenter', (evt, d) => {
      const label = d.type === 'module' ? `Module ${String(d.mod.order).padStart(2,'0')}: ${d.mod.label}` : `${d.name} (Module ${String(d.mod.order).padStart(2,'0')})`;
      showTooltip(evt, `<div class="tt-title">${label}</div><div class="tt-meta">${d.pct}% complete</div>`);
    }).on('mouseleave', hideTooltip);
  }

  function showModuleDetail(mod) {
    detailPanel.classList.add('open');
    const mp = Progress.getModuleProgress(mod);
    const modId = mod.id.replace('mod:', '');
    const srcCount = data.edges.filter(e => e.type === 'curriculum' && e.target === mod.id).length;
    let sectionsHtml = (mod.sections || []).map(sec => {
      const sp = Progress.getSectionProgress(modId, sec.id, sec.items);
      const color = SEC_COLORS[sec.id] || '#888';
      return `
        <div class="module-section-card" data-mod="${modId}" data-sec="${sec.id}" style="border-left:3px solid ${color}">
          <h4 style="color:${color}">${sec.label}</h4>
          <div class="sec-meta">${sp.completed}/${sp.total} completed · ${sp.pct}%</div>
          <div class="section-progress-bar"><div class="section-progress-fill" style="width:${sp.pct}%;background:${color}"></div></div>
        </div>`;
    }).join('');

    detailContent.innerHTML = `
      <div class="detail-type module">Module ${String(mod.order).padStart(2,'0')}</div>
      <div class="detail-title">${mod.label}</div>
      <div class="detail-meta">${srcCount} sources · ${mp.completed}/${mp.total} items</div>
      <div class="section-progress">
        <div class="section-progress-bar"><div class="section-progress-fill" style="width:${mp.pct}%;background:var(--purple)"></div></div>
      </div>
      <p style="font-size:12px;color:var(--text-dim);margin-top:8px;">${mod.overview || ''}</p>
      <div class="module-sections-list">${sectionsHtml}</div>
    `;

    detailContent.querySelectorAll('.module-section-card').forEach(card => {
      card.addEventListener('click', () => {
        const sec = (mod.sections || []).find(s => s.id === card.dataset.sec);
        if (sec) showSectionDetail(mod, sec);
      });
    });
  }

  function showSectionDetail(mod, sec) {
    detailPanel.classList.add('open');
    const modId = mod.id.replace('mod:', '');
    const color = SEC_COLORS[sec.id] || '#888';
    const sp = Progress.getSectionProgress(modId, sec.id, sec.items);

    const STRENGTH_COLORS = { evergreen: '#10b981', established: '#06b6d4', emerging: '#f59e0b', stale: '#ef4444' };
    const sortedItems = [...sec.items].sort((a, b) => (b.strength || 0) - (a.strength || 0));
    const itemsHtml = sortedItems.map(item => {
      const done = Progress.isComplete(modId, sec.id, item.id);
      const cls = item.classification || 'emerging';
      const clsColor = STRENGTH_COLORS[cls] || '#888';
      const badge = item.strength > 0
        ? `<span class="strength-badge" style="color:${clsColor}" title="${cls}: ${item.support_count || 0} sources, ${item.creator_count || 0} creators">${cls[0].toUpperCase()}</span>`
        : '';
      return `
        <label class="concept-item ${done ? 'completed' : ''}" data-item="${item.id}">
          <input type="checkbox" ${done ? 'checked' : ''}>
          <span class="concept-title">${item.title}</span>
          ${badge}
        </label>`;
    }).join('');

    detailContent.innerHTML = `
      <div class="detail-type" style="color:${color}">Module ${String(mod.order).padStart(2,'0')} · ${sec.label}</div>
      <div class="detail-title">${mod.label}</div>
      <div class="detail-meta">${sp.completed}/${sp.total} completed · ${sp.pct}%</div>
      <div class="section-progress">
        <div class="section-progress-bar"><div class="section-progress-fill" style="width:${sp.pct}%;background:${color}"></div></div>
      </div>
      <div class="concept-list">${itemsHtml}</div>
    `;

    detailContent.querySelectorAll('.concept-item input').forEach(cb => {
      cb.addEventListener('change', () => {
        const itemEl = cb.closest('.concept-item');
        const itemId = itemEl.dataset.item;
        Progress.toggle(modId, sec.id, itemId);
        itemEl.classList.toggle('completed', cb.checked);
        // Update progress display
        const newSp = Progress.getSectionProgress(modId, sec.id, sec.items);
        detailContent.querySelector('.detail-meta').textContent = `${newSp.completed}/${newSp.total} completed · ${newSp.pct}%`;
        detailContent.querySelector('.section-progress-fill').style.width = `${newSp.pct}%`;
        // Re-render sankey to reflect changes
        renderCurriculum();
      });
    });
  }

  // ── THESES VIEW ──
  let thesisFilter = 'all';
  function renderTheses() {
    const container = document.getElementById('theses-view');
    const theses = data.theses || [];

    // Trend arrows and confidence dots
    const trendArrow = t => t === 'strengthening' ? '\u2191' : t === 'weakening' ? '\u2193' : '\u2192';
    const confDots = c => c === 'high' ? '\u25CF\u25CF\u25CF' : c === 'medium' ? '\u25CF\u25CF\u25CB' : '\u25CF\u25CB\u25CB';

    const filtered = thesisFilter === 'all' ? theses : theses.filter(t => t.status === thesisFilter);

    container.innerHTML = `
      <div class="thesis-filter-bar">
        ${['all','confirmed','evolved','challenged','debunked'].map(f =>
          `<button class="thesis-filter-btn ${thesisFilter===f?'active':''}" data-filter="${f}">${f === 'all' ? 'All' : f.charAt(0).toUpperCase() + f.slice(1)} ${f === 'all' ? `(${theses.length})` : `(${theses.filter(t=>t.status===f).length})`}</button>`
        ).join('')}
      </div>
      <div class="theses-grid">
        ${filtered.map(t => `
          <div class="thesis-card" data-thesis="${t.id}">
            <div class="thesis-header">
              <span class="thesis-id">${t.id}</span>
              <span class="thesis-title">${t.title}</span>
              <span class="thesis-status ${t.status}">${t.status}</span>
            </div>
            <div class="thesis-meta">
              <span class="thesis-trend ${t.trend}">${trendArrow(t.trend)} ${t.trend}</span>
              <span class="thesis-confidence" title="${t.confidence} confidence">${confDots(t.confidence)}</span>
              <span>${t.evidence}</span>
            </div>
            <div class="thesis-summary">${t.summary}</div>
            <div class="thesis-modules">${(t.modules || []).map(m => `<span class="thesis-mod-tag">Module ${m}</span>`).join('')}</div>
          </div>
        `).join('')}
      </div>
    `;

    // Filter buttons
    container.querySelectorAll('.thesis-filter-btn').forEach(btn => {
      btn.addEventListener('click', () => { thesisFilter = btn.dataset.filter; renderTheses(); });
    });

    // Card click -> detail panel
    container.querySelectorAll('.thesis-card').forEach(card => {
      card.addEventListener('click', () => {
        const t = (data.theses || []).find(th => th.id === card.dataset.thesis);
        if (!t) return;
        detailPanel.classList.add('open');
        detailContent.innerHTML = `
          <div class="detail-type" style="color:${t.status === 'confirmed' ? '#10b981' : t.status === 'evolved' ? '#06b6d4' : t.status === 'challenged' ? '#f59e0b' : '#ef4444'}">${t.id} \u00B7 ${t.status.toUpperCase()}</div>
          <div class="detail-title">${t.title}</div>
          <div class="detail-meta">${t.evidence} \u00B7 ${t.confidence} confidence \u00B7 ${t.trend}</div>
          <p style="margin-top:12px;font-size:13px;line-height:1.6;color:var(--text)">${t.summary}</p>
          <div style="margin-top:12px">${(t.modules || []).map(m => `<span class="thesis-mod-tag" style="font-size:12px;padding:3px 8px">Module ${m}</span>`).join(' ')}</div>
        `;
      });
    });
  }

  // ── TAGS VIEW ──
  let tagSubView = 'cloud';
  function renderTags() {
    const container = document.getElementById('tags-view');
    container.innerHTML = `
      <div class="tag-toggle-bar">
        <button class="tag-toggle-btn ${tagSubView==='cloud'?'active':''}" data-sub="cloud">Tag Cloud</button>
        <button class="tag-toggle-btn ${tagSubView==='heatmap'?'active':''}" data-sub="heatmap">Co-occurrence</button>
      </div>
      <div id="tag-sub-content"></div>
    `;
    container.querySelectorAll('.tag-toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => { tagSubView = btn.dataset.sub; renderTags(); });
    });
    if (tagSubView === 'cloud') renderTagCloud();
    else renderHeatmap();
  }

  function renderTagCloud() {
    const el = document.getElementById('tag-sub-content');
    const tags = data.nodes.filter(n => n.type === 'tag').sort((a,b) => b.count - a.count);
    const maxCount = Math.max(...tags.map(t => t.count));
    el.innerHTML = '<div class="tag-cloud">' + tags.map(t => {
      const size = 12 + (t.count / maxCount) * 24;
      return `<span class="tag-cloud-item" style="font-size:${size}px" data-tag="${t.label}">${t.label} (${t.count})</span>`;
    }).join('') + '</div>';
    el.querySelectorAll('.tag-cloud-item').forEach(span => {
      span.addEventListener('click', () => {
        activeFilters.tags.clear();
        activeFilters.tags.add(span.dataset.tag);
        const cb = document.querySelector(`[data-filter="tags"][value="${span.dataset.tag}"]`);
        if (cb) cb.checked = true;
        document.querySelector('[data-view="graph"]').click();
        applyFilters();
      });
    });
  }

  function renderHeatmap() {
    const el = document.getElementById('tag-sub-content');
    el.innerHTML = '<div class="heatmap-container"></div>';
    const tags = data.nodes.filter(n => n.type === 'tag').sort((a,b) => b.count - a.count).slice(0, 25);
    const tagLabels = tags.map(t => t.label);
    const sources = data.nodes.filter(n => n.type === 'source');

    // Build co-occurrence matrix
    const matrix = [];
    for (let i = 0; i < tagLabels.length; i++) {
      matrix[i] = [];
      for (let j = 0; j < tagLabels.length; j++) {
        const count = sources.filter(s => (s.tags||[]).includes(tagLabels[i]) && (s.tags||[]).includes(tagLabels[j])).length;
        matrix[i][j] = i === j ? 0 : count;
      }
    }
    const maxVal = Math.max(...matrix.flat());
    const cellSize = 28;
    const margin = { top: 140, left: 140 };
    const size = cellSize * tagLabels.length;

    const hSvg = d3.select(el.querySelector('.heatmap-container')).append('svg')
      .attr('width', size + margin.left + 20).attr('height', size + margin.top + 20);
    const hg = hSvg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

    const color = d3.scaleSequential(d3.interpolateYlOrRd).domain([0, maxVal]);

    // Cells
    for (let i = 0; i < tagLabels.length; i++) {
      for (let j = 0; j < tagLabels.length; j++) {
        if (i === j) continue;
        const v = matrix[i][j];
        if (v === 0) continue;
        hg.append('rect')
          .attr('class', 'heatmap-cell')
          .attr('x', j * cellSize).attr('y', i * cellSize)
          .attr('width', cellSize - 1).attr('height', cellSize - 1)
          .attr('fill', color(v)).attr('rx', 2)
          .on('mouseover', (evt) => {
            const shared = sources.filter(s => (s.tags||[]).includes(tagLabels[i]) && (s.tags||[]).includes(tagLabels[j]));
            showTooltip(evt, `<div class="tt-title">${tagLabels[i]} + ${tagLabels[j]}</div><div class="tt-meta">${shared.length} shared: ${shared.slice(0,3).map(s=>'['+s.id+']').join(', ')}${shared.length>3?'...':''}</div>`);
          })
          .on('mouseout', hideTooltip);
      }
    }

    // Labels
    tagLabels.forEach((label, i) => {
      hg.append('text').attr('class', 'heatmap-label').attr('x', -6).attr('y', i * cellSize + cellSize / 2)
        .attr('text-anchor', 'end').attr('dominant-baseline', 'middle').text(label);
      hg.append('text').attr('class', 'heatmap-label')
        .attr('x', i * cellSize + cellSize / 2).attr('y', -6)
        .attr('text-anchor', 'start').attr('dominant-baseline', 'middle')
        .attr('transform', `rotate(-60, ${i * cellSize + cellSize / 2}, -6)`)
        .text(label);
    });
  }

  // ── RESIZE ──
  window.addEventListener('resize', () => {
    width = canvas.clientWidth; height = canvas.clientHeight;
    svg.attr('width', width).attr('height', height);
    if (simulation) {
      simulation.force('center', d3.forceCenter(width / 2, height / 2));
      simulation.alpha(0.1).restart();
    }
  });

  // ── INITIAL VIEW ──
  switchView(currentView);

})();
</script>
</body>
</html>
